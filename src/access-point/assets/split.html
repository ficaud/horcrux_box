<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Horcrux — Split</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="version">v0.0.4</div>
    <div class="card">
        <div class="icon">&#x1F512;</div>
        <h2>Shamir's Secret Encryption</h2>
        <p class="desc">Enter the secret you wish to encrypt using Shamir's Secret Sharing scheme. Your secret will be
            split into 5 shares. 3 are necessary to reconstruct the secret.</p>
        <div class="test-box">
            <input type="text" id="msg-input" class="msg-input" placeholder="Enter your secret..." maxlength="256">
            <button id="msg-btn" class="msg-btn">Encrypt</button>
        </div>
        <div id="share-list" class="hidden"></div>
        <a href="/" class="back-link">&#8592; Back</a>
        <div id="toast" class="toast">Copied!</div>
        <script src="scripts/split.js"></script>
    </div>
</body>

</html>
