<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Horcrux — Unsplit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="version">v0.0.4</div>
    <div class="card">
        <div class="icon">&#x1F513;</div>
        <h2>Reconstruct Secret</h2>
        <p class="desc">Enter your shares below to reconstruct the original secret using Shamir's Secret Sharing scheme.
        </p>

        <div id="share-rows">
            <div class="share-row">
                <input type="number" class="x-input" value="1" min="1" max="255" placeholder="x">
                <input type="text" class="d-input" placeholder='Hex data or "x:hex" e.g. 3:60b5b9...'>
            </div>
            <div class="share-row">
                <input type="number" class="x-input" value="2" min="1" max="255" placeholder="x">
                <input type="text" class="d-input" placeholder='Hex data or "x:hex" e.g. 4:1352fb...'>
            </div>
            <div class="share-row">
                <input type="number" class="x-input" value="3" min="1" max="255" placeholder="x">
                <input type="text" class="d-input" placeholder='Hex data or "x:hex" e.g. 5:3aafa8...'>
            </div>
        </div>

        <button id="unsplit-btn" class="msg-btn" style="width:100%;margin-bottom:16px;">Reconstruct</button>

        <div id="result-box" class="hidden" style="margin-bottom:16px;">
            <div class="result-label">Reconstructed secret:</div>
            <div class="result-value" id="result-text"></div>
            <button id="copy-result" class="copy-btn" style="margin-top:6px;">&#x1F4CB; Copy</button>
        </div>

        <a href="/" class="back-link">&#8592; Back</a>
        <div id="toast" class="toast">Copied!</div>
        <script src="scripts/unsplit.js"></script>
    </div>
</body>

</html>
