# SPDX-License-Identifier: Apache-2.0
#
# Build the WASM demo and deploy to GitHub Pages.

name: Pages

on:
  push:
    branches: [main, master, dev/jfi]
    paths:
      - '.github/workflows/pages.yml'
      - 'demo/**'
      - 'src/access-point/**'
      - 'src/sss/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM with Emscripten
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            emscripten/emsdk:latest \
            make -C demo clean all

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages/scripts
          cp src/access-point/assets/index.html     pages/
          cp src/access-point/assets/split.html     pages/
          cp src/access-point/assets/unsplit.html   pages/
          cp demo/flash.html                        pages/
          cp src/access-point/assets/style.css      pages/
          cp demo/scripts/sss.js                    pages/scripts/
          cp demo/scripts/sss.wasm                  pages/scripts/
          cp src/access-point/assets/scripts/split.js   pages/scripts/
          cp src/access-point/assets/scripts/unsplit.js pages/scripts/

          # Download firmware binaries from the latest release (same-origin, no CORS)
          echo "Downloading firmware from latest release..."
          RELEASE=$(curl -sL https://api.github.com/repos/ficaud/horcrux-core/releases/latest)

          URL_S3=$(echo "$RELEASE" | jq -r '.assets[] | select(.name=="firmware-esp32s3.bin") | .browser_download_url')
          echo "ESP32-S3: $URL_S3"
          curl -sL --fail -o pages/firmware-esp32s3.bin "$URL_S3"

          URL_ESP32=$(echo "$RELEASE" | jq -r '.assets[] | select(.name=="firmware-esp32-wroom.bin") | .browser_download_url')
          echo "ESP32: $URL_ESP32"
          curl -sL --fail -o pages/firmware-esp32-wroom.bin "$URL_ESP32"

          # Write a tiny manifest for the flash page to read
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "{\"tag\":\"$TAG\"}" > pages/firmware.json

          ls -la pages/ pages/scripts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
