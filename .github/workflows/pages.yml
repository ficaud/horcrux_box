# SPDX-License-Identifier: Apache-2.0
#
# Build the WASM demo and deploy to GitHub Pages.

name: Pages

on:
  push:
    branches: [main, master, dev/jfi]
    paths:
      - 'demo/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WASM with Emscripten
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            emscripten/emsdk:latest \
            make -C demo clean all

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp demo/index.html pages/
          cp demo/style.css  pages/
          cp demo/sss.js     pages/
          cp demo/sss.wasm   pages/
          cp -r demo/scripts pages/
          ls -la pages/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
