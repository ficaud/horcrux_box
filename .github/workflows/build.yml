#
# CI — Build Zephyr firmware pour ESP32-S3-DevKitC-1 (procpu)
# Utilise l'image Docker du devcontainer (.devcontainer/Dockerfile).

name: Build

on:
  push:
    branches: [main, master, dev/jfi]
  pull_request:
    branches: [main, master, dev/jfi]
  workflow_dispatch:

jobs:
  unitary-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/lib/mono /usr/local/julia* /opt/hostedtoolcache
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: zephyr-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and run unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/horcrux \
            -w /workspaces/horcrux \
            zephyr-dev:latest \
            bash -c "
              set -e -x
              git submodule update --init --recursive
              cmake -S tests -B tests/build-native -DCMAKE_BUILD_TYPE=Debug 2>&1
              cmake --build tests/build-native --parallel 2>&1
              echo '=== Build complete, running tests ==='
              ctest --test-dir tests/build-native --output-on-failure --verbose 2>&1
            "

  build:
    needs: unitary-tests
    strategy:
      matrix:
        target:
          - board: esp32s3_devkitc/esp32s3/procpu
            artifact: fw-esp32-s3-devkitc-1
          - board: doit_esp32_devkit_v1/esp32/procpu
            artifact: fw-esp32-devkit-v1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/lib/mono /usr/local/julia* /opt/hostedtoolcache
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: zephyr-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup West workspace
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/horcrux \
            -w /workspaces/horcrux \
            zephyr-dev:latest \
            bash -c '
              mkdir -p .west &&
              printf "[manifest]\npath = .\nfile = west.yml\n\n[zephyr]\nbase = zephyr\n" > .west/config &&
              west update
            '

      - name: Build firmware (${{ matrix.target.board }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/horcrux \
            -w /workspaces/horcrux \
            zephyr-dev:latest \
            west build -b ${{ matrix.target.board }} -p always -d build .

      - name: Archive firmware (${{ matrix.target.artifact }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact }}
          path: build/zephyr/zephyr.bin
          if-no-files-found: warn
