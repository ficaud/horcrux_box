# SPDX-License-Identifier: Apache-2.0
#
# Release workflow — Build le firmware et crée une GitHub Release
# avec les artefacts de compilation (zephyr.bin, zephyr.elf, etc.).

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v1.0.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        target:
          - board: esp32s3_devkitc/esp32s3/procpu
            artifact: fw-esp32-s3-devkitc-1
          - board: doit_esp32_devkit_v1/esp32/procpu
            artifact: fw-esp32-devkit-v1
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/lib/mono /usr/local/julia* /opt/hostedtoolcache
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: zephyr-dev:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup West workspace
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/horcrux \
            -w /workspaces/horcrux \
            zephyr-dev:latest \
            bash -c '
              mkdir -p .west &&
              printf "[manifest]\npath = .\nfile = west.yml\n\n[zephyr]\nbase = zephyr\n" > .west/config &&
              west update
            '

      - name: Build firmware (${{ matrix.target.artifact }})
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspaces/horcrux \
            -w /workspaces/horcrux \
            zephyr-dev:latest \
            west build -b ${{ matrix.target.board }} -p always -d build .

      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          cp build/zephyr/zephyr.bin release-artifacts/${{ matrix.target.artifact }}.bin
          cp build/zephyr/zephyr.elf release-artifacts/${{ matrix.target.artifact }}.elf
          cp build/zephyr/zephyr.map release-artifacts/${{ matrix.target.artifact }}.map

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.target.artifact }}
          path: release-artifacts/*

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: firmware-*

      - name: Flatten artifacts
        run: |
          mkdir -p flattened
          find release-artifacts -type f \( -name '*.bin' -o -name '*.elf' -o -name '*.map' \) -exec cp {} flattened/ \;

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Horcrux Core Firmware ${{ steps.version.outputs.tag }}

            Firmware for **ESP32-S3-DevKitC-1** and **ESP32-DevKit-V1 (WROOM-32)**.

            Wi-Fi captive portal access point (SSID: `Horcrux-core`).

            ### Flashing instructions

            **ESP32-S3** (flash offset `0x0`):
            ```bash
            esptool --chip esp32s3 --port <PORT> --baud 921600 \
              write-flash 0x0 fw-esp32-s3-devkitc-1.bin
            ```

            **ESP32 (WROOM-32)** (flash offset `0x1000`):
            ```bash
            esptool --chip esp32 --port <PORT> --baud 460800 \
              write-flash 0x1000 fw-esp32-devkit-v1.bin
            ```

            > **Note:** ESP32 requires offset `0x1000` because the first 4 KB flash sector is reserved by the ROM bootloader.
          files: flattened/*
          draft: true
          generate_release_notes: false
