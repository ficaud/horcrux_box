<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Horcrux — Shamir's Secret Sharing</title>
    <link rel="stylesheet" href="style.css">
    <script src="sss.js"></script>
    <script>var Module = null; SSS().then(function (m) { Module = m; });</script>
</head>

<body>
    <div class="version">Horcrux · WASM demo</div>

    <!-- ─── Navigation tabs ─── -->
    <div class="tabs">
        <button id="tab-split" class="tab active">Split</button>
        <button id="tab-unsplit" class="tab">Reconstruct</button>
    </div>

    <!-- ─── Split page ─── -->
    <div id="page-split" class="page active">
        <div class="card">
            <div class="icon">&#x1F512;</div>
            <h2>Shamir's Secret Encryption</h2>
            <p class="desc">Enter a secret to split into 5 shares. Any 3 can reconstruct it.</p>
            <div class="test-box">
                <input type="text" id="msg-input" class="msg-input" placeholder="Enter your secret..." maxlength="256">
                <button id="msg-btn" class="msg-btn">Encrypt</button>
            </div>
            <div id="share-list" class="hidden"></div>
        </div>
    </div>

    <!-- ─── Unsplit page ─── -->
    <div id="page-unsplit" class="page">
        <div class="card">
            <div class="icon">&#x1F513;</div>
            <h2>Reconstruct Secret</h2>
            <p class="desc">Paste shares in <code>x:hex</code> format (one per line) to recover the original secret.</p>
            <textarea id="shares-textarea" class="share-textarea"
                placeholder="3:60b5b9cfc025&#10;4:1352fbd4a387&#10;5:3aafa808928b" rows="4"></textarea>
            <button id="reconstruct-btn" class="msg-btn" style="width:100%;margin-bottom:16px;">Reconstruct</button>
            <div id="result-box" class="hidden">
                <div class="result-label">Reconstructed secret:</div>
                <div class="result-value" id="result-text"></div>
                <button id="copy-result" class="copy-btn" style="margin-top:6px;">&#x1F4CB; Copy</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="scripts/app.js?v=2"></script>
</body>

</html>
